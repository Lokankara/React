<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 170" width="100%" height="100%">
  <defs>
    <!-- Shadow for the laptop icon circle -->
    <linearGradient id="longShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    
    <!-- Clip path to keep long shadow inside the circle -->
    <clipPath id="circleClip">
      <circle cx="115" cy="85" r="68" />
    </clipPath>
  </defs>

  <!-- Background Dark Gray Banner -->
  <rect x="40" y="52" width="390" height="66" rx="2" fill="#424242" />

  <!-- Blue Circle Base -->
  <circle cx="115" cy="85" r="68" fill="#50B6E2" />

  <!-- Shadow Group (clipped to circle) -->
  <g clip-path="url(#circleClip)">
    <!-- Diagonal long shadow casting down and to the right -->
    <polygon points="115,70 200,155 160,200 80,120" fill="url(#longShadow)" />
  </g>

  <!-- Laptop Vector Graphic -->
  <g transform="translate(115, 85)">
    <!-- Laptop Base/Keyboard Area -->
    <path d="M -51,19 L 51,19 C 53,19 53,24 51,24 L -51,24 C -53,24 -53,19 -51,19 Z" fill="#F0E6D2" />
    
    <!-- Laptop Screen Outer Border -->
    <rect x="-39" y="-23" width="78" height="42" rx="3" ry="3" fill="#604E44" />
    
    <!-- Laptop Inner Screen -->
    <rect x="-34" y="-19" width="68" height="34" fill="#FFFFFF" />

    <!-- Graduation Cap (Mortarboard) -->
    <!-- Cap Diamond/Top -->
    <polygon points="0,-11 23,-3 0,5 -23,-3" fill="#5B534E" />
    
    <!-- Cap Skullcap/Base -->
    <path d="M -11,-1 L -11,4 C -11,7 11,7 11,4 L 11,-1 Z" fill="#5B534E" />
    
    <!-- Tassel -->
    <path d="M 0,-3 L 15,-1 C 15,3 17,3 17,6" stroke="#5B534E" stroke-width="1.5" fill="none" stroke-linecap="round" />
    <circle cx="17" cy="7" r="1.5" fill="#5B534E" />
  </g>

  <!-- Typography: COURSES -->
  <text x="250" y="99" 
        font-family="'League Gothic', 'Impact', 'Arial Narrow', sans-serif" 
        font-size="43" 
        font-stretch="condensed"
        fill="#FFFFFF" 
        letter-spacing="1">COURSES</text>
</svg>
